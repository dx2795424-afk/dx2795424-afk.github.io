<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="#0B1118" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- official seal: square cinnabar block with stylised dragon character hint (purely geometric), rope tassel -->
  <rect x="16" y="16" width="32" height="32" fill="#A83232" stroke="#0B1118" stroke-width="2.4" rx="2" />
  <!-- inscribed rectangle (mimics engraved seal) -->
  <rect x="22" y="22" width="20" height="20" fill="none" stroke="#F2E6C9" stroke-width="1.8" />
  <line x1="22" y1="32" x2="42" y2="32" stroke="#F2E6C9" stroke-width="1.8" />
  <line x1="32" y1="22" x2="32" y2="42" stroke="#F2E6C9" stroke-width="1.8" />
  <!-- tassel -->
  <path d="M40 48 L42 56 M44 48 L46 56 M48 48 L50 56" stroke="#0B1118" stroke-width="1.6" />
</svg>
